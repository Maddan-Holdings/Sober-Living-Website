<!--
Default layout for the Jekyll site.
Uses `site.header_pages` from _config.yml to build the top navigation.
Keep this file simple — edit styles in assets/style.css.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- Primary description for search engines; can be overridden per-page -->
    <meta name="description" content="Sober University — supportive sober living in Bowling Green, KY. Safe, community-focused homes and recovery resources.">

    <!-- Optional keywords (small benefit) -->
    
      <meta name="keywords" content="sober living, sober living Bowling Green, sober living Bowling Green KY, recovery housing, sober homes">
    

    <!-- Title: include city/region if configured for local SEO -->
    <title>Test | Sober University — Bowling Green, KY</title>

    <link rel="stylesheet" href="/assets/style.css">

    <!-- Canonical URL if site.url is set (avoid empty absolute URLs) -->
    
      <link rel="canonical" href="http://localhost:4000/test.html">
    

    <!-- Open Graph / social previews -->
    <meta property="og:site_name" content="Sober University">
    <meta property="og:title" content="Test">
    <meta property="og:description" content="Sober University — supportive sober living in Bowling Green, KY. Safe, community-focused homes and recovery resources.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/logo.png">
    <meta property="og:url" content="http://localhost:4000/test.html">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Test">
    <meta name="twitter:description" content="Sober University — supportive sober living in Bowling Green, KY. Safe, community-focused homes and recovery resources.">
    <meta name="twitter:image" content="/assets/logo.png">
  </head>
  <body>

    <!-- Header: site brand on the left, navigation on the right -->
    <header class="site-header">
      <div class="container header-inner">
        <!-- Organization microdata for local SEO. No JS required. -->
        <div class="brand" itemscope itemtype="https://schema.org/Organization">
          <a class="brand-link" href="/" itemprop="url">
            <!-- Placeholder logo: replace /assets/logo.png with your logo image -->
            <img src="/assets/logo.png" alt="Sober University logo" class="logo" itemprop="logo">
            <span class="site-title" itemprop="name">Sober University</span>
          </a>
          <!-- Telephone & primary address (first location) added as hidden metadata for crawlers -->
          <meta itemprop="telephone" content="270-306-4252">
          
            <div itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
              <meta itemprop="streetAddress" content="1342 High Street">
              <meta itemprop="addressLocality" content="Bowling Green">
              <meta itemprop="addressRegion" content="KY">
              <meta itemprop="postalCode" content="42101">
            </div>
          
        </div>

        <nav class="site-nav" role="navigation" aria-label="Main navigation">
          <ul>
            
              <li><a href="/">Home</a></li>
            
              <li><a href="/about.html">About</a></li>
            
              <li><a href="/locations.html">Locations</a></li>
            
              <li><a href="/contact.html">Contact</a></li>
            
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main content area -->
    <main class="container">
      <h1 id="test-page-only">Test Page Only</h1>

    </main>

    <!-- Footer: simple site name and description -->
    <footer class="site-footer">
      <div class="container">
        <p class="footer-title">Sober University</p>
        <p class="footer-desc">Sober University — supportive sober living in Bowling Green, KY. Safe, community-focused homes and recovery resources.</p>
      </div>
    </footer>

  </body>
</html>
