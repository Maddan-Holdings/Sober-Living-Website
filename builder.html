<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Builder — GrapesJS</title>

    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/grapesjs-blocks-basic/dist/grapesjs-blocks-basic.min.css" />
    <link rel="stylesheet" href="assets/builder.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="menu-wrap">
          <button id="menu-toggle" type="button" class="menu-trigger" aria-expanded="false" aria-haspopup="true">
            Menu
          </button>
          <div id="menu-dropdown" class="menu-dropdown" role="menu" aria-label="Builder menu">
            <div class="menu-section">
              <h4>Pages</h4>
              <div class="menu-grid menu-grid--1">
                <select id="page-selector" aria-label="Active page"></select>
                <div class="menu-grid">
                  <button id="add-page" type="button" class="btn btn--sm">New page</button>
                  <button id="rename-page" type="button" class="btn btn--sm">Rename</button>
                  <button id="delete-page" type="button" class="btn btn--sm btn--danger">Delete</button>
                </div>
              </div>
            </div>

            <div class="menu-section">
              <h4>Devices</h4>
              <div id="menu-devices"></div>
              <p class="menu-note">Switch viewport to preview responsive layouts.</p>
            </div>

            <div class="menu-section">
              <h4>Layers</h4>
              <div id="menu-layers"></div>
            </div>

            <div class="menu-section">
              <h4>Settings</h4>
              <div class="menu-grid menu-grid--1">
                <input id="github-token" type="password" autocomplete="off" placeholder="GitHub fine-grained token" />
                <button id="save-token" type="button" class="btn">Save token</button>
              </div>
              <p class="menu-note">
                Token needs <strong>Contents: Read and write</strong> for this repository. Stored only in your browser
                (localStorage).
              </p>
            </div>

            <div class="menu-section">
              <h4>Canvas</h4>
              <div class="menu-grid menu-grid--1">
                <button id="cmd-clear-canvas" type="button" class="btn btn--danger">Clear canvas</button>
              </div>
            </div>

            <div class="menu-section">
              <h4>Import</h4>
              <div class="menu-grid menu-grid--1">
                <label class="menu-note" style="display: block">HTML file (body content)</label>
                <input id="import-html-file" type="file" accept=".html,.htm,text/html" />
                <textarea id="import-html-textarea" placeholder="Or paste full HTML or body fragment here"></textarea>
                <button id="import-html-paste" type="button" class="btn">Load from text area</button>
              </div>
            </div>

            <div class="menu-section">
              <h4>Export</h4>
              <div class="menu-grid">
                <button id="copy-html" type="button" class="btn btn--sm">Copy page HTML</button>
                <button id="download-html" type="button" class="btn btn--sm">Download page</button>
                <button id="download-site" type="button" class="btn btn--sm">Download all pages</button>
                <button id="download-site-zip" type="button" class="btn btn--sm">Download ZIP</button>
              </div>
            </div>
          </div>
        </div>

        <div class="top-bar__actions">
          <button id="publish-github" type="button" class="btn btn--primary">Publish</button>
        </div>
      </header>

      <div class="builder-main">
        <aside class="panel panel--left" aria-label="Blocks">
          <div class="panel__tabs">
            <button type="button" class="panel__tab is-active" disabled style="cursor: default">Blocks</button>
          </div>
          <div class="panel__body">
            <div id="blocks-host"></div>
          </div>
        </aside>

        <div class="canvas-wrap">
          <div id="gjs"></div>
        </div>

        <aside class="panel panel--right" aria-label="Styles and traits">
          <div class="panel__tabs">
            <button type="button" id="tab-styles" class="panel__tab is-active">Styles</button>
            <button type="button" id="tab-traits" class="panel__tab">Traits</button>
          </div>
          <div id="panel-styles" class="panel__body">
            <div id="styles-host"></div>
          </div>
          <div id="panel-traits" class="panel__body panel__body--hidden">
            <div id="traits-host"></div>
          </div>
        </aside>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/grapesjs"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms"></script>
    <script src="https://unpkg.com/grapesjs-navbar"></script>
    <script src="https://unpkg.com/grapesjs-parser-postcss"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous"></script>
    <script src="assets/builder.js"></script>
  </body>
</html>
