<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrapesJS Builder</title>

    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/grapesjs-preset-webpage/dist/grapesjs-preset-webpage.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/grapesjs-blocks-basic/dist/grapesjs-blocks-basic.min.css"
    />

    <style>
      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
        background: #f3f4f6;
      }

      .builder-topbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.3rem 0.5rem;
        border-bottom: 1px solid #d1d5db;
        background: #f8fafc;
        position: relative;
        z-index: 20;
      }

      .topbar-left,
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status {
        font-size: 0.82rem;
        color: #4b5563;
      }

      button,
      input,
      select {
        border: 1px solid #9ca3af;
        border-radius: 6px;
        background: #fff;
        padding: 0.3rem 0.55rem;
        font-size: 0.85rem;
      }

      button { cursor: pointer; }

      .menu-wrap { position: relative; }

      .menu-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        width: min(420px, 90vw);
        max-height: min(70vh, 620px);
        overflow: auto;
        padding: 0.75rem;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
        display: none;
      }

      .menu-dropdown.open { display: block; }

      .menu-section { margin-bottom: 0.85rem; }
      .menu-section:last-child { margin-bottom: 0; }
      .menu-section h4 {
        margin: 0 0 0.45rem;
        font-size: 0.76rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #6b7280;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.4rem;
      }

      .menu-grid button,
      .menu-grid select,
      .menu-grid input { width: 100%; }

      .menu-note {
        margin-top: 0.4rem;
        color: #6b7280;
        font-size: 0.78rem;
      }

      #gjs {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        overflow: hidden;
      }

      .page-toolbar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.45rem;
        background: #343a40;
        border-bottom: 1px solid #1f2937;
      }

      .page-toolbar label {
        color: #e5e7eb;
        font-size: 0.8rem;
      }

      .page-toolbar select,
      .page-toolbar button {
        background: #1f2937;
        border-color: #4b5563;
        color: #f9fafb;
      }

      .gjs-pn-panels,
      .gjs-pn-views,
      .gjs-pn-devices-c,
      .gjs-pn-commands {
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <header class="builder-topbar">
      <div class="topbar-left">
        <div class="menu-wrap">
          <button id="menu-toggle" type="button">☰ Menu</button>
          <div id="menu-dropdown" class="menu-dropdown" role="menu" aria-label="Builder menu">
            <div class="menu-section">
              <h4>File</h4>
              <div class="menu-grid">
                <button id="download-html" type="button">Download Current Page</button>
                <button id="download-site" type="button">Export All Pages</button>
                <button id="copy-html" type="button">Copy Current HTML</button>
              </div>
            </div>

            <div class="menu-section">
              <h4>Publish Settings</h4>
              <div class="menu-grid">
                <input id="github-token" type="password" placeholder="GitHub token" />
                <button id="save-token" type="button">Save Token</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <span class="status" id="status">Ready</span>
        <button id="publish-github" type="button">Publish Live</button>
      </div>
    </header>

    <div class="page-toolbar">
      <label for="page-selector">Page</label>
      <select id="page-selector" aria-label="Select page"></select>
      <button id="add-page" type="button">Add</button>
      <button id="rename-page" type="button">Rename</button>
      <button id="delete-page" type="button">Delete</button>
    </div>

    <div id="gjs"></div>

    <script src="https://unpkg.com/grapesjs"></script>
    <script src="https://unpkg.com/grapesjs-preset-webpage"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms"></script>
    <script src="https://unpkg.com/grapesjs-navbar"></script>
    <script src="https://unpkg.com/grapesjs-tabs"></script>
    <script src="https://unpkg.com/grapesjs-custom-code"></script>
    <script src="https://unpkg.com/grapesjs-tooltip"></script>
    <script src="https://unpkg.com/grapesjs-component-countdown"></script>
    <script src="https://unpkg.com/grapesjs-plugin-export"></script>
    <script src="https://unpkg.com/grapesjs-parser-postcss"></script>
    <script src="https://unpkg.com/grapesjs-touch"></script>
    <script src="https://unpkg.com/grapesjs-style-bg"></script>
    <script src="https://unpkg.com/grapesjs-typed"></script>
    <script>
      const STORAGE_KEY = 'grapes_publish_token';
      const PROJECT_STORAGE_KEY = 'gjs-project-v3';
      const BRANCH = 'main';

      const statusEl = document.getElementById('status');
      const tokenInput = document.getElementById('github-token');
      const pageSelector = document.getElementById('page-selector');
      const menuDropdown = document.getElementById('menu-dropdown');

      function slugify(value) {
        return String(value || '')
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')
          .slice(0, 64);
      }

      function detectRepoFromUrl() {
        const host = window.location.hostname;
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        let owner = '';
        let repo = '';

        if (host.endsWith('github.io')) {
          owner = host.replace('.github.io', '');
          repo = pathParts[0] || `${owner}.github.io`;
        }

        return { owner, repo, branch: BRANCH };
      }

      const repoInfo = detectRepoFromUrl();

      function getPageFilename(page, index) {
        if (!page) return 'index.html';
        const name = page.get('name') || page.getId() || `page-${index + 1}`;
        const slug = page.get('slug') || slugify(name);
        return index === 0 ? 'index.html' : `${slug || `page-${index + 1}`}.html`;
      }

      function getPageFileMap(editor) {
        return editor.Pages.getAll().map((page, index) => ({
          id: page.getId(),
          name: page.get('name') || page.getId(),
          filename: getPageFilename(page, index),
        }));
      }

      function resolveInternalHref(editor, pageId) {
        const pages = editor.Pages.getAll();
        const idx = pages.findIndex(pg => pg.getId() === pageId);
        if (idx < 0) return '';
        return getPageFilename(pages[idx], idx);
      }

      function getExportHtml(editor) {
        const html = editor.getHtml();
        const css = editor.getCss();

        return `<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site</title>
  <style>
${css}
  </style>
</head>
<body>
${html}
</body>
</html>`;
      }

      function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      async function getExistingFileSha(owner, repo, branch, path, token) {
        const res = await fetch(
          `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(branch)}`,
          {
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: 'application/vnd.github+json',
            },
          }
        );

        if (res.status === 404) return null;
        if (!res.ok) throw new Error(`GitHub lookup failed (${res.status}) for ${path}`);

        const data = await res.json();
        return data.sha;
      }

      async function uploadFileToGitHub(owner, repo, branch, path, content, token) {
        let sha = await getExistingFileSha(owner, repo, branch, path, token);

        for (let attempt = 0; attempt < 2; attempt += 1) {
          const payload = {
            message: `Publish ${path} from GrapesJS builder`,
            content: utf8ToBase64(content),
            branch,
          };

          if (sha) payload.sha = sha;

          const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: 'application/vnd.github+json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });

          if (res.ok) return;
          if (res.status === 409 && attempt === 0) {
            sha = await getExistingFileSha(owner, repo, branch, path, token);
            continue;
          }

          const errorText = await res.text();
          throw new Error(`Publish failed (${res.status}) for ${path}: ${errorText}`);
        }
      }

      function collectPagesForExport(editor) {
        const activePage = editor.Pages.getSelected();
        const output = editor.Pages.getAll().map((page, index) => {
          editor.Pages.select(page);
          return {
            id: page.getId(),
            name: page.get('name') || `Page ${index + 1}`,
            filename: getPageFilename(page, index),
            html: getExportHtml(editor),
          };
        });

        if (activePage) editor.Pages.select(activePage);
        return output;
      }

      function withInternalLinkTraits(defaults) {
        const baseTraits = defaults.traits || [];
        const traitNames = baseTraits.map(tr => (typeof tr === 'string' ? tr : tr.name));
        if (traitNames.includes('linkType')) return baseTraits;

        return [
          ...baseTraits,
          {
            type: 'select',
            name: 'linkType',
            label: 'Link Type',
            options: [
              { id: 'external', label: 'External URL' },
              { id: 'internal', label: 'Internal Page' },
            ],
            changeProp: 1,
          },
          { type: 'text', name: 'href', label: 'External URL', placeholder: 'https://example.com' },
          {
            type: 'select',
            name: 'internalPage',
            label: 'Internal Page',
            options: [{ id: '', label: 'Select page' }],
            changeProp: 1,
          },
        ];
      }

      function ensureLinkBehavior(editor) {
        const domc = editor.DomComponents;
        const defaultType = domc.getType('default');

        ['link'].forEach(typeName => {
          const type = domc.getType(typeName);
          if (!type) return;

          domc.addType(typeName, {
            model: type.model.extend(
              {
                defaults: {
                  ...type.model.prototype.defaults,
                  traits: withInternalLinkTraits(type.model.prototype.defaults),
                  linkType: 'external',
                  internalPage: '',
                },

                init() {
                  this.listenTo(this, 'change:linkType change:attributes:href change:internalPage', () => {
                    const linkType = this.get('linkType') || 'external';
                    const attrs = { ...(this.getAttributes() || {}) };
                    if (linkType === 'internal') {
                      const pageId = this.get('internalPage');
                      const targetHref = resolveInternalHref(editor, pageId);
                      attrs.href = targetHref || attrs.href || '#';
                      if (this.get('tagName') === 'button') {
                        attrs.onclick = attrs.href ? `window.location.href='${attrs.href}'` : '';
                      }
                    } else if (this.get('tagName') === 'button') {
                      const href = attrs.href || '#';
                      attrs.onclick = `window.location.href='${href}'`;
                    }
                    this.setAttributes(attrs);
                  });
                },
              },
              {
                isComponent: type.model.isComponent || defaultType.model.isComponent,
              }
            ),
            view: type.view,
          });
        });
      }

      function refreshPageSelector(editor) {
        const pages = editor.Pages.getAll();
        const selected = editor.Pages.getSelected();
        pageSelector.innerHTML = '';

        pages.forEach((page, index) => {
          const option = document.createElement('option');
          option.value = page.getId();
          option.textContent = `${index + 1}. ${page.get('name') || page.getId()}`;
          if (selected && selected.getId() === page.getId()) option.selected = true;
          pageSelector.appendChild(option);
        });
      }

      function refreshInternalPageTraitOptions(editor) {
        const pageOptions = getPageFileMap(editor).map(page => ({
          id: page.id,
          label: `${page.name} (${page.filename})`,
        }));

        const wrapper = editor.getWrapper();
        if (!wrapper) return;
        const components = [...wrapper.find('a'), ...wrapper.find('button')];

        components.forEach(component => {
          const traits = component.get('traits') || [];
          traits.forEach(trait => {
            if (typeof trait !== 'string' && trait.name === 'internalPage') {
              trait.options = [{ id: '', label: 'Select page' }, ...pageOptions];
            }
          });
          component.set('traits', [...traits]);
        });
      }

      function createNewPage(editor) {
        const name = window.prompt('New page name (eg: About):', 'New Page');
        if (!name) return;

        const slugInput = window.prompt('Slug (eg: about). Leave blank to auto-generate:', slugify(name));
        const slug = slugify(slugInput || name);
        const id = `page-${Date.now()}`;

        const page = editor.Pages.add({ id, name: name.trim(), slug });
        editor.Pages.select(page);
        editor.setComponents(`<section style="padding:40px 20px;"><h1>${name}</h1><p>Start building this page.</p></section>`);
        refreshPageSelector(editor);
        refreshInternalPageTraitOptions(editor);
        statusEl.textContent = `Created page "${name}".`;
      }

      const editor = grapesjs.init({
        container: '#gjs',
        fromElement: false,
        height: '100%',
        width: 'auto',
        storageManager: {
          type: 'local',
          autosave: true,
          autoload: true,
          stepsBeforeSave: 1,
          options: {
            local: {
              key: PROJECT_STORAGE_KEY,
            },
          },
        },
        pageManager: {
          pages: [{ id: 'home', name: 'Home', slug: 'home' }],
        },
        plugins: [
          'gjs-preset-webpage',
          'gjs-blocks-basic',
          'gjs-plugin-forms',
          'gjs-navbar',
          'gjs-tabs',
          'gjs-custom-code',
          'gjs-tooltip',
          'gjs-component-countdown',
          'gjs-plugin-export',
          'grapesjs-parser-postcss',
          'grapesjs-touch',
          'grapesjs-style-bg',
          'grapesjs-typed',
        ],
        pluginsOpts: {
          'gjs-preset-webpage': {
            blocksBasicOpts: { flexGrid: true },
            navbarOpts: true,
            formsOpts: true,
            countdownOpts: true,
          },
          'gjs-blocks-basic': { flexGrid: true },
          'gjs-plugin-forms': {},
          'gjs-navbar': {},
          'gjs-tabs': {},
          'gjs-custom-code': {},
          'gjs-tooltip': {},
          'gjs-component-countdown': {},
          'gjs-plugin-export': {},
          'grapesjs-parser-postcss': {},
          'grapesjs-touch': {},
          'grapesjs-style-bg': {},
          'grapesjs-typed': {},
        },
      });

      ensureLinkBehavior(editor);

      if (!repoInfo.owner || !repoInfo.repo) {
        statusEl.textContent = 'Open this via your GitHub Pages URL for one-click publish.';
      }

      const savedToken = localStorage.getItem(STORAGE_KEY);
      if (savedToken) tokenInput.value = savedToken;

      function ensureDefaultHomeContent() {
        const home = editor.Pages.getAll().at(0);
        if (!home) return;

        editor.Pages.select(home);
        const wrapper = editor.getWrapper();
        if (!wrapper || wrapper.components().length) return;

        editor.setComponents(`
          <section style="padding: 48px 20px; text-align: center;">
            <h1 style="margin: 0 0 12px;">Welcome to your GrapesJS Builder</h1>
            <p style="margin: 0;">Build multiple pages and link them with internal page links.</p>
          </section>
        `);
      }

      ensureDefaultHomeContent();

      // Ensure manager commands are easy to access
      const pn = editor.Panels;
      if (!pn.getButton('options', 'open-blocks')) pn.addButton('options', { id: 'open-blocks', className: 'fa fa-th-large', command: 'open-blocks' });
      if (!pn.getButton('options', 'open-layers')) pn.addButton('options', { id: 'open-layers', className: 'fa fa-bars', command: 'open-layers' });
      if (!pn.getButton('options', 'open-sm')) pn.addButton('options', { id: 'open-sm', className: 'fa fa-paint-brush', command: 'open-sm' });
      if (!pn.getButton('options', 'open-tm')) pn.addButton('options', { id: 'open-tm', className: 'fa fa-cog', command: 'open-tm' });
      if (!pn.getButton('options', 'open-assets')) pn.addButton('options', { id: 'open-assets', className: 'fa fa-folder-open', command: 'open-assets' });

      editor.Commands.run('open-blocks');

      const bm = editor.BlockManager;
      const blockCategory = 'Extra Components';
      bm.add('extra-section', {
        label: 'Section',
        category: blockCategory,
        content: '<section style="padding:40px 20px;"><h2>Section title</h2><p>Add content here.</p></section>',
      });
      bm.add('extra-button', {
        label: 'Button Link',
        category: blockCategory,
        content: '<a href="#" style="display:inline-block;padding:10px 16px;background:#1f6feb;color:#fff;text-decoration:none;border-radius:6px;">Button</a>',
      });
      bm.add('extra-divider', {
        label: 'Divider',
        category: blockCategory,
        content: '<hr style="margin:24px 0;border:none;border-top:1px solid #d1d5db;" />',
      });
      bm.add('extra-list', {
        label: 'List',
        category: blockCategory,
        content: '<ul><li>List item</li><li>List item</li><li>List item</li></ul>',
      });
      bm.add('extra-table', {
        label: 'Table',
        category: blockCategory,
        content: '<table style="width:100%;border-collapse:collapse;"><tr><th style="border:1px solid #ccc;padding:8px;">Header</th><th style="border:1px solid #ccc;padding:8px;">Header</th></tr><tr><td style="border:1px solid #ccc;padding:8px;">Cell</td><td style="border:1px solid #ccc;padding:8px;">Cell</td></tr></table>',
      });
      bm.add('extra-map', {
        label: 'Map',
        category: blockCategory,
        content: '<iframe width="100%" height="300" frameborder="0" style="border:0" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=los%20angeles&t=&z=13&ie=UTF8&iwloc=&output=embed" allowfullscreen></iframe>',
      });
      bm.add('extra-video', {
        label: 'YouTube',
        category: blockCategory,
        content: '<iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>',
      });
      bm.add('extra-form', {
        label: 'Form',
        category: blockCategory,
        content: '<form><div style="margin-bottom:10px;"><label>Name</label><input type="text" name="name" style="display:block;width:100%;padding:8px;" /></div><div style="margin-bottom:10px;"><label>Email</label><input type="email" name="email" style="display:block;width:100%;padding:8px;" /></div><button type="submit">Submit</button></form>',
      });
      bm.add('extra-tabs', {
        label: 'Tabs',
        category: blockCategory,
        content: '<div data-gjs-type="tabs"><div data-gjs-type="tab-container"><div data-gjs-type="tab-active">Tab 1</div><div>Tab 2</div></div><div data-gjs-type="tab-content"><div data-gjs-type="tab-active">Tab 1 content</div><div>Tab 2 content</div></div></div>',
      });
      bm.add('extra-countdown', {
        label: 'Countdown',
        category: blockCategory,
        content: '<div data-gjs-type="countdown" data-end-time="2027-01-01T00:00:00"></div>',
      });

      refreshPageSelector(editor);
      refreshInternalPageTraitOptions(editor);

      editor.on('page', () => {
        refreshPageSelector(editor);
        refreshInternalPageTraitOptions(editor);
      });
      editor.on('page:select', () => {
        refreshPageSelector(editor);
        refreshInternalPageTraitOptions(editor);
      });
      editor.on('storage:store', () => {
        statusEl.textContent = 'Saved locally.';
      });

      document.getElementById('menu-toggle').addEventListener('click', e => {
        e.stopPropagation();
        menuDropdown.classList.toggle('open');
      });
      document.addEventListener('click', e => {
        if (!e.target.closest('.menu-wrap')) menuDropdown.classList.remove('open');
      });

      pageSelector.addEventListener('change', e => {
        const target = editor.Pages.get(e.target.value);
        if (target) editor.Pages.select(target);
      });

      document.getElementById('add-page').addEventListener('click', () => createNewPage(editor));

      document.getElementById('rename-page').addEventListener('click', () => {
        const page = editor.Pages.getSelected();
        if (!page) return;

        const nextName = window.prompt('Rename page:', page.get('name') || page.getId());
        if (!nextName) return;

        const nextSlugInput = window.prompt('Slug:', page.get('slug') || slugify(nextName));
        page.set('name', nextName.trim());
        page.set('slug', slugify(nextSlugInput || nextName));

        refreshPageSelector(editor);
        refreshInternalPageTraitOptions(editor);
        statusEl.textContent = `Renamed page to "${nextName}".`;
      });

      document.getElementById('delete-page').addEventListener('click', () => {
        const pages = editor.Pages.getAll();
        if (pages.length <= 1) {
          statusEl.textContent = 'At least one page is required.';
          return;
        }

        const selected = editor.Pages.getSelected();
        if (!selected) return;

        const ok = window.confirm(`Delete page "${selected.get('name') || selected.getId()}"?`);
        if (!ok) return;

        editor.Pages.remove(selected);
        const first = editor.Pages.getAll().at(0);
        if (first) editor.Pages.select(first);

        refreshPageSelector(editor);
        refreshInternalPageTraitOptions(editor);
        statusEl.textContent = 'Page deleted.';
      });

      document.getElementById('save-token').addEventListener('click', () => {
        const token = tokenInput.value.trim();
        if (!token) {
          statusEl.textContent = 'Paste token first.';
          return;
        }

        localStorage.setItem(STORAGE_KEY, token);
        tokenInput.value = '';
        statusEl.textContent = 'Token saved.';
      });

      document.getElementById('copy-html').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(getExportHtml(editor));
          statusEl.textContent = 'Current page HTML copied.';
        } catch {
          statusEl.textContent = 'Clipboard blocked by this browser.';
        }
      });

      document.getElementById('download-html').addEventListener('click', () => {
        const selected = editor.Pages.getSelected();
        const pages = editor.Pages.getAll();
        const filename = getPageFilename(selected, Math.max(0, pages.indexOf(selected)));

        const blob = new Blob([getExportHtml(editor)], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        statusEl.textContent = `Downloaded ${filename}`;
      });

      document.getElementById('download-site').addEventListener('click', () => {
        const pages = collectPagesForExport(editor);

        pages.forEach(page => {
          const blob = new Blob([page.html], { type: 'text/html' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');

          a.href = url;
          a.download = page.filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });

        statusEl.textContent = `Exported ${pages.length} page(s).`;
      });

      async function publishToGitHub() {
        const token = tokenInput.value.trim() || localStorage.getItem(STORAGE_KEY) || '';
        const { owner, repo, branch } = repoInfo;

        if (!owner || !repo) {
          statusEl.textContent = 'Open this from your GitHub Pages URL first.';
          return;
        }
        if (!token) {
          statusEl.textContent = 'Save your token from Menu > Publish Settings first.';
          return;
        }

        try {
          const pages = collectPagesForExport(editor);
          statusEl.textContent = `Publishing ${pages.length} page(s)...`;

          for (const page of pages) {
            await uploadFileToGitHub(owner, repo, branch, page.filename, page.html, token);
          }

          statusEl.textContent = `Published ${pages.length} page(s).`;
        } catch (err) {
          statusEl.textContent = `Error: ${err.message}`;
        }
      }

      document.getElementById('publish-github').addEventListener('click', publishToGitHub);
    </script>
  </body>
</html>
