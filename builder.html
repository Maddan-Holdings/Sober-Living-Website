<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Builder</title>
  <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#353535}

    .topbar{display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 14px;background:#1e1e1e;border-bottom:1px solid #111;z-index:100;flex-shrink:0}
    .topbar-left,.topbar-right{display:flex;align-items:center;gap:10px}
    .menu-wrap{position:relative}
    #menu-btn{background:#2d2d2d;color:#bbb;border:1px solid #444;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px}
    #menu-btn:hover{background:#3a3a3a;color:#fff}
    .btn-publish{background:#4f46e5;color:#fff;border:none;padding:7px 20px;border-radius:5px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .btn-publish:hover{background:#4338ca}
    .status-text{color:#777;font-size:12px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .menu-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;width:400px;max-height:82vh;overflow-y:auto;background:#1e1e1e;border:1px solid #333;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:200;padding:8px}
    .menu-dropdown.open{display:block}
    .menu-section{margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #2a2a2a}
    .menu-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
    .menu-section-title{color:#777;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;padding:0 4px;font-weight:600}
    .menu-row{display:flex;gap:4px;margin-bottom:4px}
    .menu-row:last-child{margin-bottom:0}
    .menu-btn{flex:1;background:#2a2a2a;color:#bbb;border:1px solid #3a3a3a;padding:7px 8px;border-radius:5px;font-size:12px;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
    .menu-btn:hover{background:#3a3a3a;color:#fff}
    .menu-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
    .menu-select,.menu-input{flex:1;background:#2a2a2a;color:#ccc;border:1px solid #3a3a3a;padding:7px 8px;border-radius:5px;font-size:12px}
    .menu-select:focus,.menu-input:focus{border-color:#4f46e5;outline:none}

    .editor-wrap{display:flex;height:calc(100vh - 44px);overflow:hidden}
    .panel-left{width:240px;min-width:240px;background:#2d2d2d;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;overflow:hidden}
    .panel-header{padding:10px 14px;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1a1a1a;flex-shrink:0}
    #blocks{flex:1;overflow-y:auto;padding:6px}
    .panel-right{width:280px;min-width:280px;background:#2d2d2d;border-left:1px solid #1a1a1a;display:flex;flex-direction:column;overflow:hidden}
    .panel-tabs{display:flex;border-bottom:1px solid #1a1a1a;background:#1e1e1e;flex-shrink:0}
    .tab-btn{flex:1;background:transparent;color:#777;border:none;border-bottom:2px solid transparent;padding:9px 4px;font-size:12px;cursor:pointer;font-weight:500}
    .tab-btn:hover{color:#ccc}
    .tab-btn.active{color:#fff;border-bottom-color:#4f46e5}
    .tab-content{flex:1;overflow-y:auto}
    .editor-canvas{flex:1;overflow:hidden;position:relative}
    #gjs{height:100%;width:100%}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;justify-content:center;align-items:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:24px;width:500px;max-width:92vw;max-height:82vh;overflow-y:auto;color:#ccc}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:18px;color:#fff}
    .modal-section{margin-bottom:18px}
    .modal-section:last-child{margin-bottom:0}
    .modal-section-title{font-size:13px;font-weight:600;color:#999;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .modal-input{width:100%;background:#2a2a2a;color:#ddd;border:1px solid #444;padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:8px}
    .modal-textarea{width:100%;height:220px;background:#2a2a2a;color:#ddd;border:1px solid #444;padding:9px 12px;border-radius:6px;font-size:12px;font-family:'SF Mono',Monaco,Consolas,monospace;resize:vertical;margin-bottom:8px}
    .modal-btn{background:#4f46e5;color:#fff;border:none;padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .modal-btn:hover{background:#4338ca}
    .modal-btn-secondary{background:#2a2a2a;color:#ccc;border:1px solid #444}
    .modal-btn-secondary:hover{background:#3a3a3a}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
    .modal-close{background:transparent;color:#888;border:none;padding:9px 16px;border-radius:6px;font-size:13px;cursor:pointer}
    .modal-close:hover{color:#fff}
    .modal-note{font-size:12px;color:#666;margin-bottom:10px;line-height:1.5}

    .gjs-pn-panels{display:none!important}
    .gjs-cv-canvas{width:100%!important;height:100%!important;top:0!important;left:0!important}
    .gjs-block{width:auto;min-height:auto;padding:10px 5px}
    .gjs-blocks-cs{display:flex;flex-wrap:wrap;justify-content:flex-start}
    .gjs-sm-sector .gjs-sm-sector-title{border-bottom-color:#2a2a2a}
    .gjs-clm-tags{padding:6px 8px}
    .gjs-clm-tag{background:#3a3a3a}
    #selectors{border-bottom:1px solid #2a2a2a}

    .panel-left::-webkit-scrollbar,.tab-content::-webkit-scrollbar,.menu-dropdown::-webkit-scrollbar,#blocks::-webkit-scrollbar{width:5px}
    .panel-left::-webkit-scrollbar-thumb,.tab-content::-webkit-scrollbar-thumb,.menu-dropdown::-webkit-scrollbar-thumb,#blocks::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
    .panel-left::-webkit-scrollbar-thumb:hover,.tab-content::-webkit-scrollbar-thumb:hover{background:#555}
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="menu-wrap">
        <button id="menu-btn" type="button"><i class="fa-solid fa-bars"></i> Menu</button>
        <div id="menu-dropdown" class="menu-dropdown">

          <div class="menu-section">
            <div class="menu-section-title">Pages</div>
            <div class="menu-row">
              <select id="page-select" class="menu-select" aria-label="Select page"></select>
            </div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-add-page"><i class="fa-solid fa-plus"></i> Add</button>
              <button type="button" class="menu-btn" id="btn-rename-page"><i class="fa-solid fa-pen"></i> Rename</button>
              <button type="button" class="menu-btn" id="btn-delete-page"><i class="fa-solid fa-trash"></i> Delete</button>
            </div>
          </div>

          <div class="menu-section">
            <div class="menu-section-title">Devices</div>
            <div class="menu-row">
              <button type="button" class="menu-btn active" data-device="Desktop"><i class="fa-solid fa-desktop"></i> Desktop</button>
              <button type="button" class="menu-btn" data-device="Tablet"><i class="fa-solid fa-tablet-screen-button"></i> Tablet</button>
              <button type="button" class="menu-btn" data-device="Mobile"><i class="fa-solid fa-mobile-screen-button"></i> Mobile</button>
            </div>
          </div>

          <div class="menu-section">
            <div class="menu-section-title">Canvas</div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-undo"><i class="fa-solid fa-rotate-left"></i> Undo</button>
              <button type="button" class="menu-btn" id="btn-redo"><i class="fa-solid fa-rotate-right"></i> Redo</button>
            </div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-clear"><i class="fa-solid fa-eraser"></i> Clear Canvas</button>
              <button type="button" class="menu-btn" id="btn-preview"><i class="fa-solid fa-eye"></i> Preview</button>
            </div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-fullscreen"><i class="fa-solid fa-expand"></i> Fullscreen</button>
              <button type="button" class="menu-btn" id="btn-borders"><i class="fa-solid fa-border-all"></i> Toggle Borders</button>
            </div>
          </div>

          <div class="menu-section">
            <div class="menu-section-title">Import / Export</div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-import"><i class="fa-solid fa-file-import"></i> Import HTML</button>
              <button type="button" class="menu-btn" id="btn-export-html"><i class="fa-solid fa-code"></i> View Code</button>
            </div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-download-page"><i class="fa-solid fa-download"></i> Download Page</button>
              <button type="button" class="menu-btn" id="btn-download-zip"><i class="fa-solid fa-file-zipper"></i> Export ZIP</button>
            </div>
          </div>

          <div class="menu-section">
            <div class="menu-section-title">Sync</div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-sync-github"><i class="fa-solid fa-cloud-arrow-down"></i> Load from GitHub</button>
            </div>
          </div>

          <div class="menu-section">
            <div class="menu-section-title">Settings</div>
            <div class="menu-row">
              <input type="password" id="github-token" class="menu-input" placeholder="GitHub Personal Access Token">
            </div>
            <div class="menu-row">
              <button type="button" class="menu-btn" id="btn-save-token"><i class="fa-solid fa-key"></i> Save Token</button>
              <button type="button" class="menu-btn" id="btn-clear-storage"><i class="fa-solid fa-database"></i> Clear Storage</button>
            </div>
          </div>

        </div>
      </div>
    </div>
    <div class="topbar-right">
      <span id="status" class="status-text">Ready</span>
      <button id="publish-btn" class="btn-publish" type="button"><i class="fa-solid fa-rocket"></i> Publish</button>
    </div>
  </header>

  <div class="editor-wrap">
    <div class="panel-left">
      <div class="panel-header">Blocks</div>
      <div id="blocks"></div>
    </div>
    <div class="editor-canvas">
      <div id="gjs"></div>
    </div>
    <div class="panel-right">
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="tab-styles">Styles</button>
        <button class="tab-btn" data-tab="tab-traits">Settings</button>
        <button class="tab-btn" data-tab="tab-layers">Layers</button>
      </div>
      <div class="tab-content" id="tab-styles"><div id="selectors"></div><div id="styles"></div></div>
      <div class="tab-content" id="tab-traits" style="display:none"><div id="traits"></div></div>
      <div class="tab-content" id="tab-layers" style="display:none"><div id="layers"></div></div>
    </div>
  </div>

  <div id="loading-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;justify-content:center;align-items:center;flex-direction:column;gap:16px">
    <div style="width:36px;height:36px;border:3px solid #555;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div id="loading-text" style="color:#ccc;font-size:14px">Loading project from GitHub...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <div id="publish-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title"><i class="fa-solid fa-rocket"></i> Publish Website</div>
      <div class="modal-section">
        <div class="modal-section-title"><i class="fa-brands fa-github"></i> Publish to GitHub Pages</div>
        <div class="modal-note">Commits all pages directly to your GitHub repository. <span id="repo-info" style="color:#aaa"></span></div>
        <button type="button" class="modal-btn" id="btn-publish-github"><i class="fa-solid fa-upload"></i> Publish to GitHub</button>
      </div>
      <div class="modal-section">
        <div class="modal-section-title"><i class="fa-solid fa-download"></i> Download as ZIP</div>
        <div class="modal-note">Downloads all pages as a ZIP file you can host anywhere.</div>
        <button type="button" class="modal-btn modal-btn-secondary" id="btn-publish-zip"><i class="fa-solid fa-file-zipper"></i> Download ZIP</button>
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-close" id="btn-close-publish">Cancel</button>
      </div>
    </div>
  </div>

  <div id="import-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title"><i class="fa-solid fa-file-import"></i> Import HTML</div>
      <textarea id="import-textarea" class="modal-textarea" placeholder="Paste your HTML code here..."></textarea>
      <div class="modal-footer">
        <button type="button" class="modal-btn" id="btn-do-import"><i class="fa-solid fa-check"></i> Import</button>
        <button type="button" class="modal-close" id="btn-close-import">Cancel</button>
      </div>
    </div>
  </div>

  <div id="export-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title"><i class="fa-solid fa-code"></i> Page Code</div>
      <textarea id="export-textarea" class="modal-textarea" readonly></textarea>
      <div class="modal-footer">
        <button type="button" class="modal-btn" id="btn-copy-code"><i class="fa-solid fa-copy"></i> Copy</button>
        <button type="button" class="modal-close" id="btn-close-export">Close</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/grapesjs"></script>
  <script src="https://unpkg.com/grapesjs-blocks-basic"></script>
  <script src="https://unpkg.com/grapesjs-plugin-forms"></script>
  <script src="https://unpkg.com/grapesjs-navbar"></script>
  <script src="https://unpkg.com/grapesjs-tabs"></script>
  <script src="https://unpkg.com/grapesjs-custom-code"></script>
  <script src="https://unpkg.com/grapesjs-tooltip"></script>
  <script src="https://unpkg.com/grapesjs-component-countdown"></script>
  <script src="https://unpkg.com/grapesjs-plugin-export"></script>
  <script src="https://unpkg.com/grapesjs-parser-postcss"></script>
  <script src="https://unpkg.com/grapesjs-touch"></script>
  <script src="https://unpkg.com/grapesjs-style-bg"></script>
  <script src="https://unpkg.com/grapesjs-typed"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
(function () {
  'use strict';

  // =============================================
  // CONFIGURATION
  // =============================================
  var TOKEN_KEY = 'gjs-builder-token';
  var PROJECT_KEY = 'gjs-project-v4';
  var DATA_FILE = 'builder-data.json';
  var BRANCH = 'main';
  var statusEl = document.getElementById('status');
  var loadingOverlay = document.getElementById('loading-overlay');
  var loadingText = document.getElementById('loading-text');

  // =============================================
  // UTILITIES
  // =============================================
  function setStatus(msg) { statusEl.textContent = msg; }

  function showLoading(msg) {
    loadingText.textContent = msg || 'Loading...';
    loadingOverlay.style.display = 'flex';
  }

  function hideLoading() {
    loadingOverlay.style.display = 'none';
  }

  function slugify(str) {
    return String(str || '').toLowerCase().trim()
      .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64);
  }

  function detectRepo() {
    var host = location.hostname;
    var parts = location.pathname.split('/').filter(Boolean);
    if (host.endsWith('.github.io')) {
      return { owner: host.replace('.github.io', ''), repo: parts[0] || host, branch: BRANCH };
    }
    return { owner: '', repo: '', branch: BRANCH };
  }

  function utf8ToBase64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  var repoInfo = detectRepo();

  // =============================================
  // EDITOR INITIALIZATION
  // =============================================
  var editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    width: 'auto',
    fromElement: false,
    panels: { defaults: [] },

    blockManager: { appendTo: '#blocks' },
    layerManager: { appendTo: '#layers' },
    traitManager: { appendTo: '#traits' },
    selectorManager: { appendTo: '#selectors' },

    styleManager: {
      appendTo: '#styles',
      sectors: [
        {
          name: 'General',
          open: true,
          properties: [
            'display', 'float', 'position',
            { property: 'top', type: 'integer', units: ['px','%','vh','auto'], defaults: 'auto' },
            { property: 'right', type: 'integer', units: ['px','%','vw','auto'], defaults: 'auto' },
            { property: 'bottom', type: 'integer', units: ['px','%','vh','auto'], defaults: 'auto' },
            { property: 'left', type: 'integer', units: ['px','%','vw','auto'], defaults: 'auto' },
            'overflow', 'overflow-x', 'overflow-y',
          ],
        },
        {
          name: 'Flex',
          open: false,
          properties: [
            'flex-direction', 'flex-wrap', 'justify-content', 'align-items',
            'align-content', 'order', 'flex-basis', 'flex-grow', 'flex-shrink', 'align-self', 'gap',
          ],
        },
        {
          name: 'Dimension',
          open: true,
          properties: [
            'width', 'min-width', 'max-width',
            'height', 'min-height', 'max-height',
            'margin', 'padding',
          ],
        },
        {
          name: 'Typography',
          open: true,
          properties: [
            'font-family', 'font-size', 'font-weight', 'letter-spacing',
            'color', 'line-height', 'text-align', 'text-decoration',
            'text-transform', 'font-style', 'text-shadow', 'white-space', 'word-break',
          ],
        },
        {
          name: 'Decorations',
          open: true,
          properties: [
            'opacity', 'background-color', 'background',
            'border-radius', 'border', 'box-shadow', 'cursor',
          ],
        },
        {
          name: 'Transform',
          open: false,
          properties: ['transition', 'transform', 'perspective'],
        },
      ],
    },

    deviceManager: {
      devices: [
        { name: 'Desktop', width: '' },
        { name: 'Tablet', width: '768px', widthMedia: '992px' },
        { name: 'Mobile', width: '320px', widthMedia: '480px' },
      ],
    },

    storageManager: {
      type: 'local',
      autosave: true,
      autoload: true,
      stepsBeforeSave: 1,
      options: { local: { key: PROJECT_KEY } },
    },

    pageManager: {
      pages: [{ id: 'home', name: 'Home', slug: 'home' }],
    },

    plugins: [
      'gjs-blocks-basic',
      'gjs-plugin-forms',
      'gjs-navbar',
      'gjs-tabs',
      'gjs-custom-code',
      'gjs-tooltip',
      'gjs-component-countdown',
      'gjs-plugin-export',
      'grapesjs-parser-postcss',
      'grapesjs-touch',
      'grapesjs-style-bg',
      'grapesjs-typed',
    ],

    pluginsOpts: {
      'gjs-blocks-basic': { flexGrid: true },
      'gjs-plugin-forms': {},
      'gjs-navbar': {},
      'gjs-tabs': {},
      'gjs-custom-code': {},
      'gjs-tooltip': {},
      'gjs-component-countdown': {},
      'gjs-plugin-export': {},
      'grapesjs-parser-postcss': {},
      'grapesjs-touch': {},
      'grapesjs-style-bg': {},
      'grapesjs-typed': {},
    },

    canvas: {
      styles: ['https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap'],
    },
  });

  // =============================================
  // CUSTOM BLOCKS
  // =============================================
  var bm = editor.BlockManager;

  bm.add('section', {
    label: '<i class="fa fa-rectangle-list"></i><div>Section</div>',
    category: 'Sections',
    content: '<section style="padding:60px 20px;"><div style="max-width:1200px;margin:0 auto;"><h2>Section Title</h2><p>Add your content here.</p></div></section>',
  });

  bm.add('hero-section', {
    label: '<i class="fa fa-image"></i><div>Hero</div>',
    category: 'Sections',
    content: '<section style="padding:100px 20px;text-align:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;"><div style="max-width:800px;margin:0 auto;"><h1 style="font-size:48px;margin-bottom:16px;font-weight:700;">Your Amazing Headline</h1><p style="font-size:20px;margin-bottom:32px;opacity:.9;">A compelling subtitle that describes your product or service</p><a href="#" style="display:inline-block;padding:14px 32px;background:#fff;color:#764ba2;text-decoration:none;border-radius:8px;font-weight:600;font-size:16px;">Get Started</a></div></section>',
  });

  bm.add('feature-section', {
    label: '<i class="fa fa-table-columns"></i><div>Features</div>',
    category: 'Sections',
    content: '<section style="padding:80px 20px;"><div style="max-width:1200px;margin:0 auto;text-align:center;"><h2 style="margin-bottom:48px;font-size:32px;">Our Features</h2><div style="display:flex;gap:32px;flex-wrap:wrap;justify-content:center;"><div style="flex:1;min-width:250px;max-width:350px;padding:32px;border-radius:12px;background:#f8f9fa;"><div style="font-size:36px;margin-bottom:16px;">&#9889;</div><h3 style="margin-bottom:8px;">Fast</h3><p style="color:#666;">Lightning fast performance for all your needs.</p></div><div style="flex:1;min-width:250px;max-width:350px;padding:32px;border-radius:12px;background:#f8f9fa;"><div style="font-size:36px;margin-bottom:16px;">&#128274;</div><h3 style="margin-bottom:8px;">Secure</h3><p style="color:#666;">Enterprise-grade security built right in.</p></div><div style="flex:1;min-width:250px;max-width:350px;padding:32px;border-radius:12px;background:#f8f9fa;"><div style="font-size:36px;margin-bottom:16px;">&#127912;</div><h3 style="margin-bottom:8px;">Beautiful</h3><p style="color:#666;">Stunning designs that look great everywhere.</p></div></div></div></section>',
  });

  bm.add('cta-section', {

  // =============================================
  // LINK TRAIT SYSTEM
  // =============================================
  function getPageOptions() {
    return editor.Pages.getAll().map(function (page, i) {
      return { id: page.getId(), label: page.get('name') || 'Page ' + (i + 1) };
    });
  }

  function getPageFilename(page, index) {
    if (!page) return 'index.html';
    var name = page.get('name') || page.getId() || 'page-' + (index + 1);
    var slug = page.get('slug') || slugify(name);
    return index === 0 ? 'index.html' : (slug || 'page-' + (index + 1)) + '.html';
  }

  function resolveInternalHref(pageId) {
    var pages = editor.Pages.getAll();
    for (var i = 0; i < pages.length; i++) {
      if (pages[i].getId() === pageId) return getPageFilename(pages[i], i);
    }
    return '#';
  }

  var dc = editor.DomComponents;
  var linkType = dc.getType('link');
  if (linkType) {
    dc.addType('link', {
      model: {
        defaults: {
          traits: [
            {
              type: 'select', name: 'linkType', label: 'Link Type', changeProp: true,
              options: [{ id: 'url', label: 'External URL' }, { id: 'page', label: 'Internal Page' }],
            },
            { type: 'text', name: 'href', label: 'URL', placeholder: 'https://example.com' },
            {
              type: 'select', name: 'internalPage', label: 'Page', changeProp: true,
              options: [{ id: '', label: '-- Select Page --' }],
            },
            {
              type: 'select', name: 'target', label: 'Open in',
              options: [{ id: '', label: 'Same Window' }, { id: '_blank', label: 'New Window' }],
            },
            { type: 'text', name: 'title', label: 'Title' },
          ],
          linkType: 'url',
          internalPage: '',
        },
        init: function () {
          this.on('change:linkType', this.handleLinkType);
          this.on('change:internalPage', this.handleInternalPage);
        },
        handleLinkType: function () {
          if (this.get('linkType') === 'page') {
            var pageId = this.get('internalPage');
            if (pageId) this.addAttributes({ href: resolveInternalHref(pageId) });
          }
        },
        handleInternalPage: function () {
          if (this.get('linkType') === 'page') {
            var pageId = this.get('internalPage');
            if (pageId) this.addAttributes({ href: resolveInternalHref(pageId) });
          }
        },
      },
    });
  }

  editor.on('component:selected', function (component) {
    if (!component) return;
    var tag = component.get('tagName');
    var type = component.get('type');
    if (type === 'link' || tag === 'a') {
      var opts = [{ id: '', label: '-- Select Page --' }].concat(getPageOptions());
      var traits = component.get('traits');
      if (traits) {
        var pt = traits.where ? traits.where({ name: 'internalPage' }) : [];
        if (pt.length) pt[0].set('options', opts);
      }
    }
  });

  // PAGE MANAGEMENT
  // =============================================
  var pageSelect = document.getElementById('page-select');

  function refreshPages() {
    var pages = editor.Pages.getAll();
    var selected = editor.Pages.getSelected();
    pageSelect.innerHTML = '';
    pages.forEach(function (page, i) {
      var opt = document.createElement('option');
      opt.value = page.getId();
      opt.textContent = (i + 1) + '. ' + (page.get('name') || page.getId());
      if (selected && selected.getId() === page.getId()) opt.selected = true;
      pageSelect.appendChild(opt);
    });
  }

  function addPage() {
    var name = prompt('Page name:', 'New Page');
    if (!name) return;
    var slug = slugify(name);
    var id = 'page-' + Date.now();
    var page = editor.Pages.add({ id: id, name: name.trim(), slug: slug });
    editor.Pages.select(page);
    editor.setComponents('<section style="padding:60px 20px;text-align:center;"><h1>' + name.trim() + '</h1><p>Start building this page.</p></section>');
    refreshPages();
    setStatus('Page "' + name.trim() + '" created.');
  }

  function renamePage() {
    var page = editor.Pages.getSelected();
    if (!page) return;
    var name = prompt('Rename page:', page.get('name') || '');
    if (!name) return;
    page.set('name', name.trim());
    page.set('slug', slugify(name));
    refreshPages();
    setStatus('Renamed to "' + name.trim() + '".');
  }

  function deletePage() {
    if (editor.Pages.getAll().length <= 1) { setStatus('Cannot delete the only page.'); return; }
    var page = editor.Pages.getSelected();
    if (!page) return;
    if (!confirm('Delete "' + (page.get('name') || page.getId()) + '"?')) return;
    editor.Pages.remove(page);
    var first = editor.Pages.getAll().at(0);
    if (first) editor.Pages.select(first);
    refreshPages();
    setStatus('Page deleted.');
  }

  // =============================================
  // EXPORT HTML
  // =============================================
  function resolveLinksOnCurrentPage() {
    var wrapper = editor.getWrapper();
    if (!wrapper) return;
    var links = wrapper.find('a');
    links.forEach(function (link) {
      if (link.get('linkType') === 'page') {
        var pid = link.get('internalPage');
        if (pid) link.addAttributes({ href: resolveInternalHref(pid) });
      }
    });
  }

  function getExportHtml(title) {
    var html = editor.getHtml();
    var css = editor.getCss();
    return '<!doctype html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>' + (title || 'Site') + '</title>\n  <link rel="preconnect" href="https://fonts.googleapis.com">\n  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">\n  <style>\n' + css + '\n  </style>\n</head>\n<body>\n' + html + '\n</body>\n</html>';
  }

  function collectAllPages() {
    var activePage = editor.Pages.getSelected();
    var pages = editor.Pages.getAll();
    var output = [];
    pages.forEach(function (page, i) {
      editor.Pages.select(page);
      resolveLinksOnCurrentPage();
      output.push({
        id: page.getId(),
        name: page.get('name') || 'Page ' + (i + 1),
        filename: getPageFilename(page, i),
        html: getExportHtml(page.get('name') || 'Site'),
      });
    });
    if (activePage) editor.Pages.select(activePage);
    return output;
  }

  // =============================================
  // PUBLISH: GITHUB
  // =============================================
  function getFileSha(owner, repo, branch, path, token) {
    return fetch(
      'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + encodeURIComponent(path) + '?ref=' + encodeURIComponent(branch),
      { headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' } }
    ).then(function (res) {
      if (res.status === 404) return null;
      if (!res.ok) throw new Error('GitHub API error (' + res.status + ') for ' + path);
      return res.json().then(function (d) { return d.sha; });
    });
  }

  function uploadFile(owner, repo, branch, path, content, token) {
    return getFileSha(owner, repo, branch, path, token).then(function (sha) {
      var body = { message: 'Update ' + path + ' via Builder', content: utf8ToBase64(content), branch: branch };
      if (sha) body.sha = sha;
      return fetch('https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + path, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      }).then(function (res) {
        if (!res.ok) return res.text().then(function (t) { throw new Error('Upload failed (' + res.status + '): ' + t); });
      });
    });
  }

  function getProjectData() {
    return editor.getProjectData();
  }

  function publishToGitHub() {
    var token = localStorage.getItem(TOKEN_KEY) || '';
    var owner = repoInfo.owner, repo = repoInfo.repo, branch = repoInfo.branch;
    if (!owner || !repo) { setStatus('Open from your GitHub Pages URL to auto-detect repo.'); return Promise.resolve(); }
    if (!token) { setStatus('Save your GitHub token in Menu \u2192 Settings first.'); return Promise.resolve(); }
    var pages = collectAllPages();
    setStatus('Publishing ' + pages.length + ' page(s)\u2026');
    var chain = Promise.resolve();
    pages.forEach(function (page) {
      chain = chain.then(function () { return uploadFile(owner, repo, branch, page.filename, page.html, token); });
    });
    chain = chain.then(function () { return uploadFile(owner, repo, branch, '.nojekyll', '', token); });
    chain = chain.then(function () {
      setStatus('Saving project data\u2026');
      var projectJson = JSON.stringify(getProjectData(), null, 2);
      return uploadFile(owner, repo, branch, DATA_FILE, projectJson, token);
    });
    return chain.then(function () {
      setStatus('\u2713 Published ' + pages.length + ' page(s) + project data saved!');
    }).catch(function (err) {
      setStatus('Error: ' + err.message);
      console.error(err);
    });
  }

  // =============================================
  // SYNC: LOAD FROM GITHUB
  // =============================================
  function fetchProjectFromGitHub(showUI) {
    var owner = repoInfo.owner;
    var repo = repoInfo.repo;

    if (!owner || !repo) {
      if (showUI) setStatus('Cannot sync: open builder from your GitHub Pages URL.');
      return Promise.resolve(null);
    }

    var dataUrl = 'https://' + owner + '.github.io/' + repo + '/' + DATA_FILE + '?t=' + Date.now();

    if (showUI) showLoading('Loading project from GitHub\u2026');

    return fetch(dataUrl).then(function (res) {
      if (!res.ok) {
        if (showUI) hideLoading();
        return null;
      }
      return res.json();
    }).catch(function () {
      if (showUI) hideLoading();
      return null;
    });
  }

  function loadProjectData(data) {
    if (!data) return;
    try {
      editor.loadProjectData(data);
      refreshPages();
      setStatus('\u2713 Project loaded from GitHub.');
    } catch (err) {
      console.error('Failed to load project data:', err);
      setStatus('Error loading project: ' + err.message);
    }
  }

  function syncFromGitHub(showUI) {
    return fetchProjectFromGitHub(showUI).then(function (data) {
      if (showUI) hideLoading();
      if (data) {
        loadProjectData(data);
        editor.store();
        return true;
      } else if (showUI) {
        setStatus('No saved project found on GitHub. Build and publish first.');
      }
      return false;
    });
  }

  // =============================================
  // PUBLISH: ZIP DOWNLOAD
  // =============================================
  function downloadAsZip() {
    try {
      var pages = collectAllPages();
      var zip = new JSZip();
      pages.forEach(function (p) { zip.file(p.filename, p.html); });
      zip.file('.nojekyll', '');
      return zip.generateAsync({ type: 'blob' }).then(function (blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'website.zip';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        setStatus('Downloaded ' + pages.length + ' page(s) as ZIP.');
      });
    } catch (err) {
      setStatus('Error: ' + err.message);
      console.error(err);
      return Promise.resolve();
    }
  }

  // =============================================
  // AUTO-LOAD FROM GITHUB ON STARTUP
  // =============================================
  function hasLocalProject() {
    try {
      var data = localStorage.getItem(PROJECT_KEY);
      if (!data) return false;
      var parsed = JSON.parse(data);
      if (parsed && parsed.pages && parsed.pages.length > 0) {
        var firstPage = parsed.pages[0];
        if (firstPage.frames && firstPage.frames.length > 0) {
          var frame = firstPage.frames[0];
          var comp = frame.component;
          if (comp && comp.components && comp.components.length > 0) return true;
        }
      }
      return false;
    } catch (e) {
      return false;
    }
  }

  function initEditor() {
    if (hasLocalProject()) {
      refreshPages();
      setStatus('Loaded from local save.');
      return;
    }

    if (repoInfo.owner && repoInfo.repo) {
      showLoading('Loading your project from GitHub\u2026');
      fetchProjectFromGitHub(false).then(function (data) {
        hideLoading();
        if (data) {
          loadProjectData(data);
          editor.store();
          setStatus('\u2713 Project restored from GitHub.');
        } else {
          ensureDefaultContent();
          refreshPages();
          setStatus('No published project found. Start building!');
        }
      });
    } else {
      ensureDefaultContent();
      refreshPages();
      setStatus('Ready');
    }
  }

  });
  document.getElementById('btn-borders').addEventListener('click', function () {
    if (editor.Commands.isActive('sw-visibility')) editor.stopCommand('sw-visibility');
    else editor.runCommand('sw-visibility');
  });

  // =============================================
  // UI: IMPORT / EXPORT
  // =============================================
  document.getElementById('btn-import').addEventListener('click', function () {
    document.getElementById('import-textarea').value = '';
    document.getElementById('import-modal').classList.add('open');
    menuDropdown.classList.remove('open');
  });
  document.getElementById('btn-close-import').addEventListener('click', function () {
    document.getElementById('import-modal').classList.remove('open');
  });
  document.getElementById('btn-do-import').addEventListener('click', function () {
    var html = document.getElementById('import-textarea').value;
    if (html.trim()) { editor.setComponents(html); setStatus('HTML imported.'); }
    document.getElementById('import-modal').classList.remove('open');
  });

  document.getElementById('btn-export-html').addEventListener('click', function () {
    var sel = editor.Pages.getSelected();
    document.getElementById('export-textarea').value = getExportHtml(sel ? sel.get('name') : 'Site');
    document.getElementById('export-modal').classList.add('open');
    menuDropdown.classList.remove('open');
  });
  document.getElementById('btn-close-export').addEventListener('click', function () {
    document.getElementById('export-modal').classList.remove('open');
  });
  document.getElementById('btn-copy-code').addEventListener('click', function () {
    var ta = document.getElementById('export-textarea');
    if (navigator.clipboard) {
      navigator.clipboard.writeText(ta.value).then(function () { setStatus('Code copied.'); })
        .catch(function () { ta.select(); document.execCommand('copy'); setStatus('Copied.'); });
    } else { ta.select(); document.execCommand('copy'); setStatus('Copied.'); }
  });

  document.getElementById('btn-download-page').addEventListener('click', function () {
    var sel = editor.Pages.getSelected();
    var pages = editor.Pages.getAll();
    var idx = Math.max(0, pages.indexOf(sel));
    var filename = getPageFilename(sel, idx);
    var blob = new Blob([getExportHtml(sel ? sel.get('name') : 'Site')], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    setStatus('Downloaded ' + filename);
    menuDropdown.classList.remove('open');
  });

  document.getElementById('btn-download-zip').addEventListener('click', function () {
    menuDropdown.classList.remove('open');
    downloadAsZip();
  });

  // =============================================
  // UI: SETTINGS
  // =============================================
  var tokenInput = document.getElementById('github-token');
  if (localStorage.getItem(TOKEN_KEY)) tokenInput.placeholder = 'Token saved \u2022\u2022\u2022\u2022';

  document.getElementById('btn-save-token').addEventListener('click', function () {
    var token = tokenInput.value.trim();
    if (!token) { setStatus('Enter a token first.'); return; }
    localStorage.setItem(TOKEN_KEY, token);
    tokenInput.value = '';
    tokenInput.placeholder = 'Token saved \u2022\u2022\u2022\u2022';
    setStatus('Token saved.');
  });

  document.getElementById('btn-clear-storage').addEventListener('click', function () {
    if (confirm('Clear all saved data? This deletes your pages and settings.')) {
      localStorage.removeItem(PROJECT_KEY);
      localStorage.removeItem(TOKEN_KEY);
      setStatus('Storage cleared. Reload the page to start fresh.');
    }
  });

  document.getElementById('btn-sync-github').addEventListener('click', function () {
    menuDropdown.classList.remove('open');
    if (!repoInfo.owner || !repoInfo.repo) {
      setStatus('Cannot sync: open builder from your GitHub Pages URL.');
      return;
    }
    if (!confirm('Load project from GitHub? This will replace your current work.')) return;
    syncFromGitHub(true);
  });

  // =============================================
  // UI: PUBLISH MODAL
  // =============================================
  document.getElementById('publish-btn').addEventListener('click', function () {
    var info = document.getElementById('repo-info');
    info.textContent = repoInfo.owner && repoInfo.repo
      ? 'Repo: ' + repoInfo.owner + '/' + repoInfo.repo
      : 'Repo not detected \u2014 open from GitHub Pages URL.';
    document.getElementById('publish-modal').classList.add('open');
  });
  document.getElementById('btn-close-publish').addEventListener('click', function () {
    document.getElementById('publish-modal').classList.remove('open');
  });
  document.getElementById('btn-publish-github').addEventListener('click', function () {
    document.getElementById('publish-modal').classList.remove('open');
    publishToGitHub();
  });
  document.getElementById('btn-publish-zip').addEventListener('click', function () {
    document.getElementById('publish-modal').classList.remove('open');
    downloadAsZip();
  });

  document.querySelectorAll('.modal-overlay').forEach(function (modal) {
    modal.addEventListener('click', function (e) {
      if (e.target === modal) modal.classList.remove('open');
    });
  });

  // =============================================
  // UI: KEYBOARD SHORTCUTS
  // =============================================
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      editor.store();
      setStatus('Saved.');
    }
  });

  // =============================================
  // EDITOR EVENTS
  // =============================================
  editor.on('page', refreshPages);
  editor.on('page:select', refreshPages);
  editor.on('storage:store', function () { setStatus('Saved'); });

  try { editor.runCommand('sw-visibility'); } catch (e) {}

})();
  </script>
</body>
</html>
