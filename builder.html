<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrapesJS Builder</title>

    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/grapesjs-preset-webpage/dist/grapesjs-preset-webpage.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/grapesjs-blocks-basic/dist/grapesjs-blocks-basic.min.css"
    />

    <style>
      :root {
        --publish-bar-height: 56px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      .publish-bar {
        height: var(--publish-bar-height);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #d1d5db;
        background: #f8fafc;
        flex-wrap: wrap;
      }

      .publish-bar button,
      .publish-bar input {
        border: 1px solid #9ca3af;
        border-radius: 6px;
        background: #fff;
        padding: 0.4rem 0.65rem;
        font-size: 0.9rem;
      }

      .publish-bar input {
        width: 290px;
      }

      .publish-bar button {
        cursor: pointer;
      }

      .publish-bar .status {
        font-size: 0.88rem;
        color: #374151;
      }

      .publish-help {
        width: 100%;
        font-size: 0.8rem;
        color: #4b5563;
      }

      .publish-help code {
        border: 1px solid #c7d2fe;
        background: #eef2ff;
        border-radius: 4px;
        padding: 0.1rem 0.35rem;
      }

      .publish-dock {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 8px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
      }

      .publish-dock input,
      .publish-dock button {
        border: 1px solid #9ca3af;
        border-radius: 6px;
        background: #fff;
        padding: 0.35rem 0.55rem;
        font-size: 0.85rem;
      }

      .publish-dock input {
        width: 240px;
      }

      #gjs {
        height: calc(100vh - var(--publish-bar-height));
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="publish-dock">
      <input id="github-token" type="password" placeholder="Paste token here" />
      <button id="save-token" type="button">Save Token</button>
      <button id="publish-github" type="button">Publish Live</button>
      <button id="hide-dock" type="button">Hide</button>
    </div>

    <div class="publish-bar">
      <button id="download-html" type="button">Download index.html</button>
      <button id="copy-html" type="button">Copy HTML</button>
      <span class="status" id="status">Ready</span>
      <small class="publish-help"
        >Token goes in the floating box at top-right. Click <code>Save Token</code> one time, then use
        <code>Publish Live</code>.</small
      >
    </div>

    <div id="gjs"></div>

    <script src="https://unpkg.com/grapesjs"></script>
    <script src="https://unpkg.com/grapesjs-preset-webpage"></script>
    <script src="https://unpkg.com/grapesjs-blocks-basic"></script>
    <script src="https://unpkg.com/grapesjs-plugin-forms"></script>
    <script src="https://unpkg.com/grapesjs-navbar"></script>
    <script src="https://unpkg.com/grapesjs-tabs"></script>
    <script src="https://unpkg.com/grapesjs-custom-code"></script>
    <script src="https://unpkg.com/grapesjs-tooltip"></script>
    <script src="https://unpkg.com/grapesjs-component-countdown"></script>
    <script src="https://unpkg.com/grapesjs-plugin-export"></script>
    <script src="https://unpkg.com/grapesjs-parser-postcss"></script>
    <script src="https://unpkg.com/grapesjs-touch"></script>
    <script src="https://unpkg.com/grapesjs-style-bg"></script>
    <script src="https://unpkg.com/grapesjs-typed"></script>
    <script>
      const STORAGE_KEY = 'grapes_publish_token';
      const BRANCH = 'main';

      function detectRepoFromUrl() {
        const host = window.location.hostname;
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        let owner = '';
        let repo = '';

        if (host.endsWith('github.io')) {
          owner = host.replace('.github.io', '');
          repo = pathParts[0] || `${owner}.github.io`;
        }

        return { owner, repo, branch: BRANCH };
      }

      function getExportHtml(editor) {
        const html = editor.getHtml();
        const css = editor.getCss();

        return `<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site</title>
  <style>
${css}
  </style>
</head>
<body>
${html}
</body>
</html>`;
      }

      function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      async function getExistingFileSha(owner, repo, branch, token) {
        const res = await fetch(
          `https://api.github.com/repos/${owner}/${repo}/contents/index.html?ref=${encodeURIComponent(branch)}`,
          {
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: 'application/vnd.github+json',
            },
          }
        );

        if (res.status === 404) return null;
        if (!res.ok) throw new Error(`GitHub lookup failed (${res.status})`);

        const data = await res.json();
        return data.sha;
      }

      async function publishToGitHub(editor, tokenInput, statusEl, repoInfo) {
        const token = tokenInput.value.trim() || localStorage.getItem(STORAGE_KEY) || '';
        const { owner, repo, branch } = repoInfo;

        if (!owner || !repo) {
          statusEl.textContent = 'Open this from your GitHub Pages URL first.';
          return;
        }

        if (!token) {
          statusEl.textContent = 'Paste your token and click Save Token first.';
          return;
        }

        try {
          statusEl.textContent = `Publishing to ${owner}/${repo}...`;

          let sha = await getExistingFileSha(owner, repo, branch, token);
          let putRes = null;

          for (let attempt = 0; attempt < 2; attempt += 1) {
            const payload = {
              message: 'Publish site from GrapesJS builder',
              content: utf8ToBase64(getExportHtml(editor)),
              branch,
            };
            if (sha) payload.sha = sha;

            putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/index.html`, {
              method: 'PUT',
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(payload),
            });

            if (putRes.ok) break;

            if (putRes.status === 409 && attempt === 0) {
              statusEl.textContent = 'File changed on GitHub. Retrying...';
              sha = await getExistingFileSha(owner, repo, branch, token);
              continue;
            }

            const errText = await putRes.text();
            throw new Error(`Publish failed (${putRes.status}): ${errText}`);
          }

          statusEl.textContent = 'Published. GitHub Pages refreshes in about 1-2 minutes.';
        } catch (err) {
          statusEl.textContent = `Error: ${err.message}`;
        }
      }

      const statusEl = document.getElementById('status');
      const tokenInput = document.getElementById('github-token');
      const repoInfo = detectRepoFromUrl();

      const savedToken = localStorage.getItem(STORAGE_KEY);
      if (savedToken) tokenInput.value = savedToken;

      if (!repoInfo.owner || !repoInfo.repo) {
        statusEl.textContent = 'Warning: open this via your GitHub Pages URL for one-click publish.';
      }

      const editor = grapesjs.init({
        container: '#gjs',
        fromElement: false,
        height: '100%',
        width: 'auto',
        storageManager: false,
        plugins: [
          'gjs-preset-webpage',
          'gjs-blocks-basic',
          'gjs-plugin-forms',
          'gjs-navbar',
          'gjs-tabs',
          'gjs-custom-code',
          'gjs-tooltip',
          'gjs-component-countdown',
          'gjs-plugin-export',
          'grapesjs-parser-postcss',
          'grapesjs-touch',
          'grapesjs-style-bg',
          'grapesjs-typed',
        ],
        pluginsOpts: {
          'gjs-preset-webpage': {
            blocksBasicOpts: { flexGrid: true },
            navbarOpts: true,
            formsOpts: true,
            countdownOpts: true,
          },
          'gjs-blocks-basic': { flexGrid: true },
          'gjs-plugin-forms': {},
          'gjs-navbar': {},
          'gjs-tabs': {},
          'gjs-custom-code': {},
          'gjs-tooltip': {},
          'gjs-component-countdown': {},
          'gjs-plugin-export': {},
          'grapesjs-parser-postcss': {},
          'grapesjs-touch': {},
          'grapesjs-style-bg': {},
          'grapesjs-typed': {},
        },
      });

      editor.setComponents(`
        <section style="padding: 48px 20px; text-align: center;">
          <h1 style="margin: 0 0 12px;">Welcome to your GrapesJS Builder</h1>
          <p style="margin: 0;">Use blocks, styles, traits, layers, and plugins like in the GrapesJS demo.</p>
        </section>
      `);

      const bm = editor.BlockManager;
      const blockCategory = 'Extra Components';
      bm.add('extra-section', {
        label: 'Section',
        category: blockCategory,
        content: '<section style="padding:40px 20px;"><h2>Section title</h2><p>Add content here.</p></section>',
      });
      bm.add('extra-button', {
        label: 'Button',
        category: blockCategory,
        content: '<a href="#" style="display:inline-block;padding:10px 16px;background:#1f6feb;color:#fff;text-decoration:none;border-radius:6px;">Button</a>',
      });
      bm.add('extra-divider', {
        label: 'Divider',
        category: blockCategory,
        content: '<hr style="margin:24px 0;border:none;border-top:1px solid #d1d5db;" />',
      });
      bm.add('extra-list', {
        label: 'List',
        category: blockCategory,
        content: '<ul><li>List item</li><li>List item</li><li>List item</li></ul>',
      });
      bm.add('extra-table', {
        label: 'Table',
        category: blockCategory,
        content: '<table style="width:100%;border-collapse:collapse;"><tr><th style="border:1px solid #ccc;padding:8px;">Header</th><th style="border:1px solid #ccc;padding:8px;">Header</th></tr><tr><td style="border:1px solid #ccc;padding:8px;">Cell</td><td style="border:1px solid #ccc;padding:8px;">Cell</td></tr></table>',
      });
      bm.add('extra-map', {
        label: 'Map',
        category: blockCategory,
        content: '<iframe width="100%" height="300" frameborder="0" style="border:0" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=los%20angeles&t=&z=13&ie=UTF8&iwloc=&output=embed" allowfullscreen></iframe>',
      });
      bm.add('extra-video', {
        label: 'YouTube',
        category: blockCategory,
        content: '<iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>',
      });
      bm.add('extra-form', {
        label: 'Form',
        category: blockCategory,
        content: '<form><div style="margin-bottom:10px;"><label>Name</label><input type="text" name="name" style="display:block;width:100%;padding:8px;" /></div><div style="margin-bottom:10px;"><label>Email</label><input type="email" name="email" style="display:block;width:100%;padding:8px;" /></div><button type="submit">Submit</button></form>',
      });
      bm.add('extra-tabs', {
        label: 'Tabs',
        category: blockCategory,
        content: '<div data-gjs-type="tabs"><div data-gjs-type="tab-container"><div data-gjs-type="tab-active">Tab 1</div><div>Tab 2</div></div><div data-gjs-type="tab-content"><div data-gjs-type="tab-active">Tab 1 content</div><div>Tab 2 content</div></div></div>',
      });
      bm.add('extra-countdown', {
        label: 'Countdown',
        category: blockCategory,
        content: '<div data-gjs-type="countdown" data-end-time="2027-01-01T00:00:00"></div>',
      });

      document.getElementById('save-token').addEventListener('click', () => {
        const token = tokenInput.value.trim();

        if (!token) {
          statusEl.textContent = 'Paste token first.';
          return;
        }

        localStorage.setItem(STORAGE_KEY, token);
        tokenInput.value = '';
        statusEl.textContent = 'Token saved. Next time just click Publish Live.';
      });

      document.getElementById('hide-dock').addEventListener('click', () => {
        document.querySelector('.publish-dock').style.display = 'none';
      });

      document.getElementById('copy-html').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(getExportHtml(editor));
          statusEl.textContent = 'HTML copied.';
        } catch (e) {
          statusEl.textContent = 'Clipboard blocked by this browser.';
        }
      });

      document.getElementById('download-html').addEventListener('click', () => {
        const blob = new Blob([getExportHtml(editor)], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        a.href = url;
        a.download = 'index.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        statusEl.textContent = 'Downloaded index.html';
      });

      document.getElementById('publish-github').addEventListener('click', () => {
        publishToGitHub(editor, tokenInput, statusEl, repoInfo);
      });
    </script>
  </body>
</html>
