<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrapesJS Builder</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/grapesjs/dist/css/grapes.min.css"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        overflow: hidden;
      }

      .topbar {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #d9d9d9;
        background: #f5f5f5;
      }

      .topbar button {
        border: 1px solid #bbb;
        border-radius: 4px;
        background: #fff;
        padding: 0.35rem 0.65rem;
        cursor: pointer;
      }

      .topbar button:hover {
        background: #efefef;
      }

      .topbar .status {
        color: #555;
        font-size: 0.9rem;
      }

      .editor-layout {
        height: calc(100vh - 48px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
      }

      .editor-main {
        min-width: 0;
        min-height: 0;
      }

      #gjs {
        height: 100%;
        width: 100%;
      }

      .editor-sidebar {
        border-left: 1px solid #2f2f2f;
        background: #181818;
        color: #ddd;
        overflow: auto;
      }

      .panel-section {
        border-bottom: 1px solid #2a2a2a;
      }

      .panel-title {
        margin: 0;
        padding: 0.55rem 0.75rem;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        background: #222;
      }

      .panel-body {
        min-height: 120px;
      }

      .blocks-container .gjs-block {
        width: auto;
      }

      .gjs-pn-commands,
      .gjs-pn-options,
      .gjs-pn-devices {
        min-height: 42px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <button id="copy-html" type="button">Copy HTML</button>
      <button id="download-html" type="button">Download HTML</button>
      <span class="status" id="status">Ready</span>
    </div>

    <div class="editor-layout">
      <div class="editor-main">
        <div id="gjs"></div>
      </div>

      <aside class="editor-sidebar">
        <section class="panel-section">
          <h2 class="panel-title">Blocks</h2>
          <div class="panel-body blocks-container"></div>
        </section>
        <section class="panel-section">
          <h2 class="panel-title">Layers</h2>
          <div class="panel-body layers-container"></div>
        </section>
        <section class="panel-section">
          <h2 class="panel-title">Styles</h2>
          <div class="panel-body styles-container"></div>
        </section>
        <section class="panel-section">
          <h2 class="panel-title">Traits</h2>
          <div class="panel-body traits-container"></div>
        </section>
      </aside>
    </div>

    <script src="https://unpkg.com/grapesjs"></script>
    <script src="https://unpkg.com/grapesjs-preset-webpage"></script>
    <script>
      const editor = grapesjs.init({
        container: '#gjs',
        fromElement: false,
        height: '100%',
        width: 'auto',
        storageManager: false,
        plugins: ['gjs-preset-webpage'],
        pluginsOpts: {
          'gjs-preset-webpage': {},
        },
        blockManager: {
          appendTo: '.blocks-container',
        },
        layerManager: {
          appendTo: '.layers-container',
        },
        styleManager: {
          appendTo: '.styles-container',
        },
        traitManager: {
          appendTo: '.traits-container',
        },
      });

      editor.setComponents(`
        <section style="padding: 48px 20px; text-align: center;">
          <h1 style="margin: 0 0 12px;">Welcome to your GrapesJS Builder</h1>
          <p style="margin: 0;">Drag blocks from the right panel into this canvas.</p>
        </section>
      `);

      const bm = editor.BlockManager;
      bm.add('custom-text', {
        label: 'Text',
        category: 'Basic',
        content: '<p>Insert your text here</p>',
      });
      bm.add('custom-image', {
        label: 'Image',
        category: 'Basic',
        content:
          '<img src="https://placehold.co/700x350" alt="Placeholder image" />',
      });
      bm.add('custom-section', {
        label: 'Section',
        category: 'Basic',
        content:
          '<section style="padding: 40px 20px;"><h2>Section title</h2><p>Add your content here.</p></section>',
      });
      bm.add('custom-button', {
        label: 'Button',
        category: 'Basic',
        content:
          '<a href="#" style="display:inline-block;padding:10px 16px;background:#1f6feb;color:#fff;text-decoration:none;border-radius:6px;">Click me</a>',
      });

      const statusEl = document.getElementById('status');
      function getExportHtml() {
        const html = editor.getHtml();
        const css = editor.getCss();
        return `<!doctype html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Exported Page</title>\n  <style>\n${css}\n  </style>\n</head>\n<body>\n${html}\n</body>\n</html>`;
      }

      async function copyHtml() {
        const output = getExportHtml();
        try {
          await navigator.clipboard.writeText(output);
          statusEl.textContent = 'HTML copied to clipboard.';
        } catch (e) {
          const ta = document.createElement('textarea');
          ta.value = output;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          statusEl.textContent = 'HTML copied (fallback).';
        }
      }

      function downloadHtml() {
        const output = getExportHtml();
        const blob = new Blob([output], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'exported-page.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        statusEl.textContent = 'HTML downloaded.';
      }

      document.getElementById('copy-html').addEventListener('click', copyHtml);
      document
        .getElementById('download-html')
        .addEventListener('click', downloadHtml);
    </script>
  </body>
</html>
