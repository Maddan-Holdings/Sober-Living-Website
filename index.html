<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sober Living Website</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        line-height: 1.5;
        color: #1f2937;
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
        background: #fff;
      }

      h1 {
        margin-top: 0;
      }

      a.button {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        text-decoration: none;
        background: #2563eb;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Your static site is now live (no Jekyll build needed)</h1>
        <p>
          This `index.html` is served directly by GitHub Pages. Use
          <strong>/builder.html</strong> to design pages with GrapesJS and export the
          result as <strong>index.html</strong> when you're ready to publish.
        </p>
        <a class="button" href="/builder.html">Open GrapesJS Builder</a>
      </section>
    </main>
  </body>
</html>
