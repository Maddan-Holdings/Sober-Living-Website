<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero { padding: 100px 20px; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .hero-inner { max-width: 800px; margin: 0 auto; }
    .hero h1 { font-size: 48px; margin-bottom: 16px; font-weight: 700; }
    .hero p { font-size: 20px; margin-bottom: 32px; opacity: .9; }
    .hero-btn { display: inline-block; padding: 14px 32px; background: #fff; color: #764ba2; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px; }
    .hero-btn:hover { background: #f0f0ff; }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <h1>Welcome to Your Website</h1>
      <p>Build beautiful pages with drag and drop</p>
      <a href="builder.html" class="hero-btn">Open Builder</a>
    </div>
  </section>
</body>
</html>
